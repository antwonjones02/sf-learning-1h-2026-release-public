name: Deploy site to GitHub Pages

# Triggers:
#   - Pushes to main (production deploy)
#   - Pushes to any claude/* branch (preview deploys for review)
#   - Manual run from the Actions tab
on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

# Required permissions for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
# so a deploy completes cleanly before the next starts.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is plain static HTML/CSS at the repo root — no build step.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
